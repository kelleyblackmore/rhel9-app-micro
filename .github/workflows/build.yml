name: Build and test (Cargo)

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check || true
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings || true
      - name: Test
        run: cargo test --release --locked || cargo test --release
